# =============================================================================
# DOCKER COMPOSE - MEDALLION ARCHITECTURE
# =============================================================================
# Luồng dữ liệu theo Medallion Architecture:
#
#  Producer → Kafka → Ingestor → ClickHouse Bronze (raw)
#                                       ↓
#                               dbt_clickhouse (Silver: clean/enrich)
#                                       ↓
#                               Sync Job (CH → StarRocks)
#                                       ↓
#                               dbt_starrocks (Gold: aggregate)
#                                       ↓
#                    ┌──────────────────┴─────────────────────┐
#                 Superset                            Segment Engine
#            (Gold dashboards)                               ↓
#                                          ┌────────────────────────────┐
#                                    StarRocks Bitmap             HBase
#                                   (segment_users)          (user_segments)
#
# SERVICES:
# 1. Kafka + Zookeeper   - Event streaming
# 2. ClickHouse          - Bronze + Silver layer (OLAP, write-optimized)
# 3. StarRocks FE + BE   - Silver mirror + Gold + Segment bitmap
# 4. HBase               - User segments key-value store
# 5. Airflow             - Pipeline orchestration
# 6. Superset            - BI dashboards
# 7. Redis + Postgres    - Metadata & broker
# =============================================================================

version: '3.8'

networks:
  tracking-network:
    driver: bridge
    name: tracking-network

volumes:
  # Kafka & Zookeeper
  zookeeper-data:
  zookeeper-logs:
  kafka-data:

  # Databases
  clickhouse-data:
  clickhouse-logs:
  starrocks-fe-meta:
  starrocks-be-storage:

  # HBase
  hbase-data:

  # Airflow
  airflow-logs:
  airflow-plugins:

  # Superset
  superset-home:

  # Redis
  redis-data:

  airflow-db-data:

services:
  # ===========================================================================
  # KAFKA - Event streaming backbone
  # Flow: Event Producer → Kafka → Tracking Ingestor → ClickHouse Bronze
  # ===========================================================================
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    hostname: kafka
    networks:
      - tracking-network
    ports:
      - "9092:9092"
    environment:
      # ====== KRaft Required ======
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # ====== Listeners ======
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ====== Storage ======
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # ====== Single node dev ======
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6

    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka UI - Monitor topics, consumer groups, lag
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - tracking-network
    ports:
      - "8082:8080"  # Dùng 8082 để tránh conflict với HBase REST
    environment:
      KAFKA_CLUSTERS_0_NAME: tracking-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

  # ===========================================================================
  # CLICKHOUSE - Bronze + Silver Layer
  #
  # BRONZE: Raw events từ Kafka (events_bronze table)
  #   - Giữ tất cả data thô, không biến đổi
  #   - TTL: 90 ngày
  #
  # SILVER: Cleaned/enriched data (silver_* tables - do dbt tạo)
  #   - Deduplicate, normalize, derive fields
  #   - TTL: 365 ngày
  #
  # Tại sao ClickHouse cho Bronze/Silver?
  #   - Ghi nhanh: 1M+ inserts/giây
  #   - Nén tốt: column-oriented storage
  #   - SQL đơn giản để dbt transform
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: clickhouse
    hostname: clickhouse
    networks:
      - tracking-network
    ports:
      - "8123:8123"  # HTTP interface (dbt, sync job dùng port này)
      - "9000:9000"  # Native TCP (Go ingestor dùng port này)
      - "9009:9009"  # Interserver HTTP
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-producer:
    image: com.tm.go.event-producer:v1.0.0
    container_name: event-producer
    hostname: event-producer
    networks:
      - tracking-network
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "-kafka=kafka:9092"
      - "-topic=payment-events"
      - "-rate=500"
    restart: unless-stopped

  # ===========================================================================
  # TRACKING INGESTOR - Validate events từ "payment-events" → forward tới
  # "payment-events-ingest" (ClickHouse Kafka Engine đọc topic này)
  # Build: bazel run //com/tm/src/services/tracking-ingestor:tracking-ingestor_docker
  # ===========================================================================
  tracking-ingestor:
    image: com.tm.go.tracking-ingestor:v1.0.0
    container_name: tracking-ingestor
    hostname: tracking-ingestor
    networks:
      - tracking-network
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "-kafka=kafka:9092"
      - "-input-topic=payment-events"
      - "-output-topic=payment-events-ingest"
      - "-group=payment-ingestor"
    restart: unless-stopped

  # ===========================================================================
  # DBT CLICKHOUSE SILVER - Transform payments_bronze → silver_events
  #
  # Build image:   docker compose build dbt-silver
  # Chạy dbt run:  docker compose run --rm dbt-silver run --profiles-dir .
  # Chạy dbt test: docker compose run --rm dbt-silver test --profiles-dir .
  # Debug conn:    docker compose run --rm dbt-silver debug --profiles-dir .
  #
  # Lưu ý: table tracking.silver_events phải tồn tại trước (xem init bên dưới).
  # on_schema_change=ignore để tránh bug SELECT * FROM (subquery) LIMIT 0
  # trên ClickHouse 26.x new analyzer.
  # ===========================================================================
  dbt-silver:
    build:
      context: ../src/services/analytics-aggregator
      dockerfile: Dockerfile.dbt
    container_name: dbt-silver
    hostname: dbt-silver
    networks:
      - tracking-network
    volumes:
      - ../src/services/analytics-aggregator/dbt_clickhouse:/usr/app
    environment:
      CLICKHOUSE_HOST: clickhouse       # internal Docker network (không phải localhost)
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    command: ["run", "--profiles-dir", "."]
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles:
      - dbt                             # chỉ start khi dùng --profile dbt hoặc run/exec
    restart: "no"

  # ===========================================================================
  # AIRFLOW - Orchestrator (LocalExecutor)
  # ===========================================================================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    networks:
      - tracking-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    hostname: airflow-webserver
    networks:
      - tracking-network
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    volumes:
      - ../src/services/analytics-aggregator/dags:/opt/airflow/dags
      - ../src/services/analytics-aggregator:/opt/analytics
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    networks:
      - tracking-network
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../src/services/analytics-aggregator/dags:/opt/airflow/dags
      - ../src/services/analytics-aggregator:/opt/analytics
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  # ===========================================================================
  # SUPERSET - BI Dashboard
  # Visualize silver_events từ ClickHouse
  #
  # Lần đầu chạy:
  #   docker compose up superset --build
  # Sau khi init xong, truy cập http://localhost:8088
  #   Login: admin / admin
  #
  # Thêm ClickHouse database:
  #   Settings → Database Connections → + →
  #   SQLAlchemy URI: clickhousedb://default:@clickhouse:8123/tracking
  # ===========================================================================
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    hostname: superset
    networks:
      - tracking-network
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "8162d0aaf944ec51fe797903d02eb653ee605b0ef0d9f887c7bb6574ba8b425e"
    volumes:
      - superset-home:/app/superset_home
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@superset.com --password admin || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
    restart: unless-stopped