# =============================================================================
# DOCKER COMPOSE — LUỒNG 1: REALTIME (ClickHouse)
# =============================================================================
#
#   event-producer (~500 events/s)
#           │ Kafka: payment-events
#           ▼
#   tracking-ingestor (validate JSON)
#           │ Kafka: payment-events-ingest
#           ▼
#   ClickHouse Kafka Engine
#           ↓ Materialized View
#   tracking.payments_bronze  (raw, TTL 90 ngày)
#           ↓ dbt (Airflow, mỗi 1 phút)
#   tracking.silver_events    (normalized)
#           ↓
#   Superset  (http://localhost:8088)
#
# =============================================================================
# SERVICES:
# 1. kafka, kafka-ui        — Event streaming
# 2. event-producer         — Sinh 500 payment events/s
# 3. tracking-ingestor      — Validate + forward → payment-events-ingest
# 4. clickhouse             — Bronze + Silver (Kafka Engine, MergeTree)
# 5. dbt-silver             — One-shot dbt transform (profile: dbt)
# 6. airflow-postgres       — Airflow metadata DB
# 7. airflow-webserver      — Airflow UI (port 8081)
# 8. airflow-scheduler      — Chạy silver_ingest DAG mỗi 1 phút
# 9. superset               — BI dashboard (port 8088)
#
# NOTE: Init thủ công — xem docs/realtime/setup.md
# =============================================================================

version: '3.8'

networks:
  realtime-network:
    driver: bridge
    name: realtime-network

volumes:
  kafka-data:
  clickhouse-data:
  clickhouse-logs:
  airflow-logs:
  superset-home:
  airflow-db-data:

services:
  # ===========================================================================
  # KAFKA
  # ===========================================================================
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    hostname: kafka
    networks:
      - realtime-network
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - realtime-network
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: realtime-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka

  # ===========================================================================
  # EVENT PRODUCER & TRACKING INGESTOR
  # Build: bazel run //com/tm/src/services/<name>:<name>_docker
  # ===========================================================================
  event-producer:
    image: com.tm.go.event-producer:v1.0.0
    container_name: event-producer
    hostname: event-producer
    networks:
      - realtime-network
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "-kafka=kafka:9092"
      - "-topic=payment-events"
      - "-rate=500"
    restart: unless-stopped

  tracking-ingestor:
    image: com.tm.go.tracking-ingestor:v1.0.0
    container_name: tracking-ingestor
    hostname: tracking-ingestor
    networks:
      - realtime-network
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "-kafka=kafka:9092"
      - "-input-topic=payment-events"
      - "-output-topic=payment-events-ingest"
      - "-group=payment-ingestor"
    restart: unless-stopped

  # ===========================================================================
  # CLICKHOUSE — Bronze + Silver
  # Init scripts: ./clickhouse/init/ (chạy tự động lần đầu)
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    container_name: clickhouse
    hostname: clickhouse
    networks:
      - realtime-network
    ports:
      - "8123:8123"   # HTTP (dbt, Superset, curl)
      - "9000:9000"   # Native TCP
      - "9009:9009"   # Interserver
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # dbt-silver: one-shot transform payments_bronze → silver_events
  # Run: docker compose run --rm dbt-silver run --profiles-dir .
  dbt-silver:
    build:
      context: ../../src/services/analytics-aggregator/realtime
      dockerfile: Dockerfile.dbt
    container_name: dbt-silver
    networks:
      - realtime-network
    volumes:
      - ../../src/services/analytics-aggregator/realtime/dbt:/usr/app
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    command: ["run", "--profiles-dir", "."]
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles:
      - dbt
    restart: "no"

  # ===========================================================================
  # AIRFLOW — Orchestrator (LocalExecutor)
  # DAGs: src/services/analytics-aggregator/realtime/dags/
  # Init thủ công: xem docs/realtime/setup.md Bước 6
  # ===========================================================================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    networks:
      - realtime-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-webserver:
    build:
      context: ..
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    hostname: airflow-webserver
    networks:
      - realtime-network
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    volumes:
      - ../../src/services/analytics-aggregator/realtime/dags:/opt/airflow/dags
      - ../../src/services/analytics-aggregator:/opt/analytics
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ..
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    networks:
      - realtime-network
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../../src/services/analytics-aggregator/realtime/dags:/opt/airflow/dags
      - ../../src/services/analytics-aggregator:/opt/analytics
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  # ===========================================================================
  # SUPERSET — BI Dashboard
  # http://localhost:8088  |  admin / admin
  # ClickHouse URI: clickhousedb://default:@clickhouse:8123/tracking
  # Init thủ công: xem docs/realtime/setup.md Bước 7
  # ===========================================================================
  superset:
    build:
      context: ..
      dockerfile: Dockerfile.superset
    container_name: superset
    hostname: superset
    networks:
      - realtime-network
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "8162d0aaf944ec51fe797903d02eb653ee605b0ef0d9f887c7bb6574ba8b425e"
    volumes:
      - superset-home:/app/superset_home
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - sh
      - -c
      - "superset run -h 0.0.0.0 -p 8088 --with-threads"
    restart: unless-stopped
