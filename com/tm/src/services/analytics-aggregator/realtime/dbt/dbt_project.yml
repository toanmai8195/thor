name: 'dbt_clickhouse_silver'
version: '1.0.0'
config-version: 2

# Profile chứa connection info (xem profiles.yml)
profile: 'clickhouse_silver'

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# MODEL CONFIGURATIONS
# =============================================================================
# Silver layer config:
#   - Materialized as TABLE (không phải VIEW)
#     → Sync job cần đọc data từ ClickHouse → cần actual table
#   - Engine = ReplacingMergeTree
#     → Deduplicate by event_id (chạy OPTIMIZE để force dedup)
#   - incremental_strategy = append
#     → Chỉ thêm data mới, không rebuild toàn bộ
# =============================================================================
models:
  dbt_clickhouse_silver:
    silver:
      +materialized: incremental
      +incremental_strategy: append
      # append_new_columns yêu cầu dbt chạy SELECT * FROM (compiled_sql) LIMIT 0
      # để so sánh schema → ClickHouse 26.x new analyzer không resolve
      # database.table trong subquery context → UNKNOWN_TABLE
      # ignore: bỏ qua schema diff, chỉ INSERT (safe vì schema payments không đổi)
      +on_schema_change: ignore

      silver_events:
        # Không set +schema: profile đã set schema: tracking
        # Nếu set +schema: tracking → dbt ghép thành tracking_tracking (sai)
        +engine: "ReplacingMergeTree()"
        # Columns thực tế trong model: event_id, user_id, amount, status, payment_date, updated_at
        # event_date và event_type không tồn tại → phải dùng payment_date
        +order_by: "['payment_date', 'user_id', 'event_id']"
        +unique_key: event_id
        +partition_by:
          field: payment_date
          data_type: date
          granularity: month

      silver_sessions:
        +engine: "AggregatingMergeTree()"
        +order_by: "['session_date', 'session_id']"
        +unique_key: session_id
        +partition_by:
          field: session_date
          data_type: date
          granularity: month

      silver_users:
        +materialized: table    # Full refresh - user dim
        +engine: "ReplacingMergeTree(updated_at)"
        +order_by: "['user_id']"
