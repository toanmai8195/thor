clickhouse_silver:
  target: dev
  outputs:
    # ==========================================================================
    # DEV: Local Docker environment
    # ==========================================================================
    dev:
      type: clickhouse
      schema: tracking          # ClickHouse database name
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: 8123               # HTTP interface (dbt-clickhouse dùng HTTP)
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      database: tracking
      secure: false
      threads: 4
      connect_timeout: 10
      send_receive_timeout: 300
      sync_request_timeout: 5
      # ClickHouse-specific settings
      custom_settings:
        max_execution_time: 300
        max_memory_usage: 10000000000

    # ==========================================================================
    # PROD: Production ClickHouse cluster
    # ==========================================================================
    prod:
      type: clickhouse
      schema: tracking
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      database: tracking
      secure: true
      threads: 8
      connect_timeout: 10
      send_receive_timeout: 600
