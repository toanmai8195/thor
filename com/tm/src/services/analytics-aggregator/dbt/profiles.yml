# =============================================================================
# DBT PROFILES CONFIGURATION
# =============================================================================
# File này định nghĩa database connections cho dbt.
#
# PRODUCTION: File này KHÔNG nên commit vào git.
# - Sử dụng environment variables
# - Hoặc tạo profiles.yml trong ~/.dbt/
#
# DEVELOPMENT: File này có thể dùng local với mock values.
#
# PROFILE STRUCTURE:
# profile_name:
#   target: default_target
#   outputs:
#     target_name:
#       type: adapter_type
#       ...connection_settings
# =============================================================================

dropshipping_analytics:
  # Target mặc định khi chạy dbt
  target: dev

  outputs:
    # =========================================================================
    # DEVELOPMENT TARGET
    # =========================================================================
    # Dùng cho local development.
    # Connect đến ClickHouse trong Docker.
    # =========================================================================
    dev:
      # Adapter type
      # dbt-clickhouse: Official ClickHouse adapter
      type: clickhouse

      # Connection settings
      # Host: localhost khi chạy từ máy host
      #       clickhouse khi chạy từ Docker
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"  # HTTP port

      # Authentication
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"

      # Target schema/database
      # ClickHouse không có schema concept như PostgreSQL
      # schema ở đây được dùng làm database name prefix
      schema: analytics
      database: tracking

      # Connection settings
      secure: false  # True cho HTTPS
      verify: false  # SSL certificate verification

      # Query settings
      connect_timeout: 10
      send_receive_timeout: 300
      sync_request_timeout: 5

      # dbt-specific settings
      threads: 4  # Parallel threads cho dbt run
      retries: 1

    # =========================================================================
    # PRODUCTION TARGET
    # =========================================================================
    # Dùng cho production environment.
    # Tất cả values từ environment variables.
    # =========================================================================
    prod:
      type: clickhouse

      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_PORT') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"

      schema: analytics
      database: tracking

      secure: true
      verify: true

      threads: 8
      retries: 3

# =============================================================================
# ENVIRONMENT VARIABLES NEEDED
# =============================================================================
# For production, set these environment variables:
#
# export CLICKHOUSE_HOST=your-clickhouse-host.example.com
# export CLICKHOUSE_PORT=8443
# export CLICKHOUSE_USER=analytics
# export CLICKHOUSE_PASSWORD=your-secure-password
#
# Or use a secrets manager (AWS Secrets Manager, HashiCorp Vault, etc.)
# =============================================================================

# =============================================================================
# NOTES ON CLICKHOUSE ADAPTER
# =============================================================================
#
# dbt-clickhouse adapter supports:
# - MergeTree and variants
# - Materialized views
# - Incremental models
#
# Limitations:
# - No true ALTER TABLE (uses mutations)
# - No unique constraints
# - Incremental deletes are slow (mutations)
#
# Best practices:
# - Use incremental models with date partitioning
# - Avoid frequent updates/deletes
# - Leverage ClickHouse's native aggregation functions
#
# Installation:
# pip install dbt-clickhouse
# =============================================================================
